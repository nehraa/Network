name: Network CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: mixnet-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hub-validation:
    name: Hub Validation
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Vet hub package
        run: bash scripts/ci/production-readiness.sh hub

  repo-validation:
    name: Repo Validation
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Run repository validation
        run: bash scripts/ci/production-readiness.sh repo

  deadcode-validation:
    name: Dead Code Validation
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Run static analysis
        run: bash scripts/ci/production-readiness.sh deadcode

  security-validation:
    name: Security Validation
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Run vulnerability scan
        run: bash scripts/ci/production-readiness.sh security

  race-validation:
    name: Race Validation
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Run race tests
        run: bash scripts/ci/production-readiness.sh race

  benchmark-smoke:
    name: Benchmark Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Run smoke benchmark
        run: bash scripts/ci/production-readiness.sh bench

  docker-sanity:
    name: Docker Integration
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Run docker integration tests
        run: bash scripts/ci/production-readiness.sh docker
